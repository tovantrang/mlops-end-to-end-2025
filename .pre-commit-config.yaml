repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.8.3
    hooks:
      # Run the linter.
      - id: ruff
        types_or: [ python, pyi ]
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        types_or: [ python, pyi ]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.1  # Use the latest stable version
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports"]  # Optional args, adjust as needed

  - repo: https://github.com/kynan/nbstripout
    rev: 0.6.1  # Use the latest stable version
    hooks:
      - id: nbstripout
        files: \.ipynb$

  - repo: https://github.com/psf/black
    rev: 23.9.1  # Use the latest stable version
    hooks:
      - id: black
        name: black-formatter
        language_version: python3  # Match your Python version

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0  # Use the latest stable version
    hooks:
      - id: check-ast
      - id: end-of-file-fixer
      - id: trailing-whitespace
